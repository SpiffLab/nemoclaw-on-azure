#cloud-config
# NemoClaw on Azure — first-boot provisioning
# Installs Docker + Node 22 (via nvm) + NemoClaw, then runs `nemoclaw onboard`.
# Placeholders __ADMIN_USERNAME__, __NVIDIA_API_KEY__, __ASSISTANT_NAME__ are
# substituted at deployment time by infra/modules/vm.bicep.

package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - jq
  - lsb-release
  - uidmap

write_files:
  - path: /etc/profile.d/nemoclaw.sh
    permissions: '0644'
    content: |
      # Loaded for interactive shells so `nemoclaw` / `openclaw` are on PATH.
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

  - path: /usr/local/sbin/nemoclaw-bootstrap.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Runs as the admin user via runcmd. Installs Node/NemoClaw and onboards.
      # The upstream installer requires a TTY for EULA acceptance when run
      # interactively; we pass NEMOCLAW_NON_INTERACTIVE=1 and
      # --yes-i-accept-third-party-software so it works under cloud-init.
      set -euo pipefail

      LOG=/var/log/nemoclaw-bootstrap.log
      # Log file is created by runcmd (root) and chowned to the admin user
      # before this script is invoked, so the tee append works.
      exec > >(tee -a "$LOG") 2>&1
      echo "[nemoclaw] bootstrap started $(date -Is)"

      export HOME="/home/__ADMIN_USERNAME__"
      cd "$HOME"

      # 1. Wait for Docker to be ready.
      for i in {1..60}; do
        if docker info >/dev/null 2>&1; then break; fi
        sleep 2
      done

      # 2. Install nvm + Node 22 (NemoClaw needs Node >=22.16, npm >=10).
      if [ ! -d "$HOME/.nvm" ]; then
        curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
      fi
      export NVM_DIR="$HOME/.nvm"
      # shellcheck disable=SC1091
      . "$NVM_DIR/nvm.sh"
      nvm install 22
      nvm alias default 22
      node --version
      npm --version

      # 3. Export NVIDIA API key for the installer (if provided at deploy time).
      if [ -n "__NVIDIA_API_KEY__" ]; then
        export NVIDIA_API_KEY="__NVIDIA_API_KEY__"
        # Persist for future shells (quoted to survive special chars in keys).
        grep -q '^export NVIDIA_API_KEY=' "$HOME/.bashrc" || \
          printf 'export NVIDIA_API_KEY=%q\n' "__NVIDIA_API_KEY__" >> "$HOME/.bashrc"
      fi

      # 4. Run the official NemoClaw installer. NEMOCLAW_NON_INTERACTIVE=1 and
      #    --yes-i-accept-third-party-software are required for cloud-init
      #    (no TTY for the EULA prompt; otherwise the installer aborts).
      export NEMOCLAW_NON_INTERACTIVE=1
      export PATH="$HOME/.local/bin:$PATH"
      curl -fsSL https://www.nvidia.com/nemoclaw.sh -o /tmp/nemoclaw-installer.sh
      bash /tmp/nemoclaw-installer.sh --yes-i-accept-third-party-software || {
        echo "[nemoclaw] installer failed; see $LOG" >&2
        exit 1
      }

      # 5. Sanity-check PATH for future SSH sessions.
      . "$NVM_DIR/nvm.sh"
      if command -v nemoclaw >/dev/null 2>&1; then
        nemoclaw --version || true
        nemoclaw "__ASSISTANT_NAME__" status || true
      fi

      # 6. Expose the OpenClaw dashboard (bound to 127.0.0.1 inside the sandbox
      #    at port 18789) on the VM host at 127.0.0.1:18789 so operators can
      #    reach it over an SSH -L tunnel. Without this forward, the tunnel
      #    connects but nothing is listening host-side → "Connection refused"
      #    in the SSH session spam. Uses openshell's own forwarder, which goes
      #    via the gateway on port 8080 — no extra NSG rule needed.
      if command -v openshell >/dev/null 2>&1; then
        # Wait for the sandbox to be Ready so `forward start` doesn't fail.
        for i in {1..30}; do
          if openshell sandbox list 2>/dev/null | grep -qE "__ASSISTANT_NAME__\s+.*Ready"; then
            break
          fi
          sleep 5
        done
        openshell forward start --background 18789 "__ASSISTANT_NAME__" || \
          echo "[nemoclaw] dashboard forward failed; run 'openshell forward start --background 18789 __ASSISTANT_NAME__' manually."
      fi

      echo "[nemoclaw] bootstrap finished $(date -Is)"

  # --- systemd unit that restarts the dashboard forward after VM reboots. ---
  # Cloud-init only runs on first boot; without this, a reboot leaves the
  # dashboard unreachable until the operator SSHes in and re-forwards.
  - path: /etc/systemd/system/openclaw-dashboard-forward.service
    permissions: '0644'
    content: |
      [Unit]
      Description=OpenClaw dashboard port forward (127.0.0.1:18789 -> sandbox)
      After=docker.service network-online.target
      Wants=docker.service network-online.target

      [Service]
      Type=simple
      User=__ADMIN_USERNAME__
      Environment=PATH=/home/__ADMIN_USERNAME__/.local/bin:/usr/local/bin:/usr/bin:/bin
      # Wait for the sandbox to be Ready (cluster + container can take a
      # minute to come back up after reboot), then run a foreground forward.
      ExecStartPre=/bin/bash -c 'for i in $(seq 1 60); do openshell sandbox list 2>/dev/null | grep -qE "__ASSISTANT_NAME__\\s+.*Ready" && exit 0; sleep 5; done; exit 1'
      ExecStart=/home/__ADMIN_USERNAME__/.local/bin/openshell forward start 18789 __ASSISTANT_NAME__
      Restart=on-failure
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

runcmd:
  # --- Ubuntu 24.04: ensure /run/sshd exists. The openssh-server tmpfiles.d
  #     rule sometimes races with cloud-init on first boot, leaving sshd
  #     unable to start ("Missing privilege separation directory: /run/sshd").
  #     Socket activation silently closes incoming SSH until this is fixed.
  - [ mkdir, -p, /run/sshd ]
  - [ chmod, '0755', /run/sshd ]
  - [ bash, -lc, 'systemctl restart ssh.socket 2>/dev/null || systemctl restart ssh.service' ]

  # --- Pre-create the bootstrap log so the admin-user script can append. ---
  - [ bash, -lc, 'touch /var/log/nemoclaw-bootstrap.log && chown __ADMIN_USERNAME__:__ADMIN_USERNAME__ /var/log/nemoclaw-bootstrap.log' ]

  # --- Docker Engine (official get.docker.com) ---
  - [ bash, -lc, 'curl -fsSL https://get.docker.com | sh' ]
  - [ systemctl, enable, --now, docker ]
  - [ usermod, -aG, docker, __ADMIN_USERNAME__ ]

  # --- NemoClaw bootstrap, running as the admin user ---
  - [ bash, -lc, 'sudo -u __ADMIN_USERNAME__ -H /usr/local/sbin/nemoclaw-bootstrap.sh' ]

  # --- Enable the dashboard-forward unit so it survives reboots. ---
  - [ systemctl, daemon-reload ]
  - [ systemctl, enable, openclaw-dashboard-forward.service ]

final_message: "NemoClaw provisioning finished. See /var/log/nemoclaw-bootstrap.log and /var/log/cloud-init-output.log."
